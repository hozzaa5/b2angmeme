<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>빵빵이 레퍼런스</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#41A2FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="빵빵밈">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* 여기어때 잘난체 (㈜여기어때컴퍼니 제공) */
  @font-face{
    font-family:'Jalnan';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff');
    font-weight:normal;font-display:swap;
  }
  :root {
    /* 빵빵이 캐릭터 컬러 */
    --green:#00681A;        /* 메인 그린 */
    --green-dark:#004d13;
    --green-soft:#d8f0dd;
    --navy:#153553;         /* 네이비 - 텍스트/보더 */
    --navy-soft:#dde6f0;
    --yellow:#FFF17C;       /* 연노랑 - 하이라이트 */
    --yellow-deep:#ffe33d;

    --bg:#fff8e5;           /* 따뜻한 크림 배경 */
    --bg2:#ffffff;          /* 카드 배경 */
    --bg3:#fffbe8;          /* 인풋 배경 */

    --text:#153553;         /* 네이비 텍스트 */
    --text2:#5a6a7e;
    --text3:#a4adbb;

    --border:var(--navy);
    --bw:0;             /* 보더 두께 */
    --radius:12px;
    --radius-lg:18px;

    /* 카툰 hard shadow */
    --shadow-c:rgba(21,53,83,.08);
    --shadow-s:0 1px 3px rgba(21,53,83,.06),0 2px 6px rgba(21,53,83,.04);
    --shadow-m:0 2px 6px rgba(21,53,83,.06),0 6px 16px rgba(21,53,83,.05);
    --shadow-l:0 4px 12px rgba(21,53,83,.08),0 12px 32px rgba(21,53,83,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;
    background:#41A2FF;
    color:var(--text);
    min-height:100vh;
    font-size:14px;
  }

  /* 상단바 */
  .top-bar{
    position:sticky;top:0;z-index:200;
    background:#41A2FF;
  }
  .top-bar-inner{max-width:1100px;margin:0 auto;padding:12px 24px;display:flex;gap:12px;align-items:center;}
  .logo-img{
    height:72px;width:auto;display:block;flex-shrink:0;
    image-rendering:auto;
    transform:rotate(-3deg);
  }
  .search-wrap{flex:1;position:relative;}
  .search-wrap input{
    width:100%;background:#fff;
    border:none;border-radius:var(--radius);
    padding:9px 14px 9px 38px;color:var(--text);
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;
    font-weight:500;outline:none;
    box-shadow:inset 2px 2px 5px rgba(15,38,60,.15),inset -1px -1px 3px rgba(15,38,60,.06);
    transition:box-shadow .1s;
  }
  .search-wrap input:focus{
    box-shadow:inset 2px 2px 6px rgba(15,38,60,.22),inset -1px -1px 3px rgba(15,38,60,.08);
  }
  .search-wrap input::placeholder{color:var(--text3);}
  .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--navy);pointer-events:none;font-size:14px;}
  .user-chip{
    display:flex;align-items:center;gap:5px;padding:7px 14px;
    background:var(--bg2);border:var(--bw) solid var(--navy);
    border-radius:30px;font-size:12px;font-weight:700;color:var(--navy);
    white-space:nowrap;cursor:pointer;box-shadow:var(--shadow-s);
    transition:transform .1s;
  }
  .user-chip:hover{transform:translateY(-1px);box-shadow:var(--shadow-m);}

  /* 버튼 */
  .btn{
    padding:9px 18px;border-radius:var(--radius);
    border:var(--bw) solid var(--navy);cursor:pointer;
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;
    font-size:14px;font-weight:500;
    box-shadow:var(--shadow-s);
    transition:all .1s;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-m);}
  .btn:active{transform:translateY(0);box-shadow:none;}
  .btn-primary{background:var(--green);color:#fff;}
  #save-btn{
    background:#663203;
    box-shadow:3px 3px 0 #3d1d02,5px 6px 10px rgba(0,0,0,.18);
    transition:transform .1s,box-shadow .1s;
  }
  #save-btn:hover{
    transform:translateY(-2px);
    box-shadow:3px 5px 0 #3d1d02,6px 9px 14px rgba(0,0,0,.22);
  }
  #save-btn:active{
    transform:translateY(2px);
    box-shadow:1px 1px 0 #3d1d02;
  }
  .btn-ghost{background:#FFF17C;color:var(--navy);border:none;}

  /* 밈 리마인드 버튼: 빨강 + 입체감 */
  .btn-remind{
    background:#CB0000;color:#fff;border:none;
    box-shadow:3px 3px 0 #800000,5px 6px 10px rgba(203,0,0,.25);
    transition:transform .1s,box-shadow .1s;
  }
  .btn-remind:hover{
    transform:translateY(-2px);
    box-shadow:3px 5px 0 #800000,6px 9px 14px rgba(203,0,0,.3);
  }
  .btn-remind:active{
    transform:translateY(2px);
    box-shadow:1px 1px 0 #800000;
  }

  /* 모달 삭제 버튼: 빨강 + 흰 글자 + 입체감 */
  .btn-delete{
    background:#d63031;color:#fff;border:none;
    box-shadow:2px 2px 0 #8e1f20;
    transition:transform .1s,box-shadow .1s;
  }
  .btn-delete:hover{
    transform:translateY(-1px);
    box-shadow:2px 3px 0 #8e1f20;
  }
  .btn-delete:active{
    transform:translateY(1px);
    box-shadow:1px 1px 0 #8e1f20;
  }
  .btn-yellow{background:var(--yellow);color:var(--navy);}
  .btn-sm{padding:6px 12px;font-size:12px;border-width:2px;box-shadow:var(--shadow-s);}
  .btn-sm:hover{box-shadow:var(--shadow-s);}

  main{max-width:1100px;margin:0 auto;padding:24px;position:relative;z-index:1;}

  /* 이름 배너 */
  .name-banner{
    background:var(--green-soft);
    border:var(--bw) solid var(--navy);border-radius:var(--radius-lg);
    padding:14px 20px;margin-bottom:20px;
    display:flex;flex-direction:row;align-items:center;gap:12px;flex-wrap:nowrap;
    box-shadow:var(--shadow-m);
  }
  .name-banner-text{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:16px;color:var(--green-dark);font-weight:500;white-space:nowrap;}
  .name-banner input{
    background:var(--bg2);border-radius:12px;
    padding:8px 12px;font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;
    color:var(--text);outline:none;width:140px;flex-shrink:0;font-weight:600;
  }
  .name-banner input:focus{box-shadow:var(--shadow-s);}

  /* 폼 */
  .form-card{
    background:#153553;
    border-radius:var(--radius-lg);
    padding:22px;margin-bottom:24px;
    box-shadow:5px 5px 0 #0F263C,8px 12px 20px rgba(15,38,60,.18);
    position:relative;
  }
  .form-mascot{
    position:absolute;
    top:-44px;right:24px;
    width:84px;height:84px;
    transform:rotate(12deg);
    z-index:1;
    pointer-events:none;
  }
  .form-title{
    font-family:'Jalnan',sans-serif;font-size:18px;
    color:#fff;letter-spacing:-.01em;margin-bottom:14px;
    display:inline-block;
  }
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group:nth-child(5n+1){transform:rotate(-.7deg);}
  .form-group:nth-child(5n+2){transform:rotate(.6deg);}
  .form-group:nth-child(5n+3){transform:rotate(-.4deg);}
  .form-group:nth-child(5n+4){transform:rotate(.8deg);}
  .form-group:nth-child(5n){transform:rotate(-.5deg);}
  .form-group.full{grid-column:1/-1;}
  label{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:13px;color:var(--navy);font-weight:500;}
  .form-card label{color:#fff;}
  .form-card label span{color:rgba(255,255,255,.6) !important;}
  input[type=text],input[type=url],textarea{
    background:#fff;
    border:none;border-radius:12px;
    padding:10px 14px;color:var(--text);
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;font-weight:500;
    outline:none;resize:none;width:100%;
    box-shadow:inset 4px 5px 10px rgba(15,38,60,.28),inset -2px -2px 5px rgba(15,38,60,.08);
    transition:box-shadow .15s;
  }
  input[type=text]:focus,input[type=url]:focus,textarea:focus{
    background:#fff;
    box-shadow:inset 4px 5px 12px rgba(15,38,60,.35),inset -2px -2px 5px rgba(15,38,60,.1);
  }
  input::placeholder,textarea::placeholder{color:var(--text3);font-weight:400;}
  .select-input{
    background:#fff;
    border:none;border-radius:12px;
    padding:10px 14px;color:var(--text);
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;font-weight:500;
    outline:none;width:100%;cursor:pointer;
    appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23153553' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:36px;
    box-shadow:inset 4px 5px 10px rgba(15,38,60,.28),inset -2px -2px 5px rgba(15,38,60,.08);
    transition:box-shadow .15s;
  }
  .select-input:focus{
    background-color:#fff;
    box-shadow:inset 4px 5px 12px rgba(15,38,60,.35),inset -2px -2px 5px rgba(15,38,60,.1);
  }
  .form-actions{display:flex;justify-content:flex-end;margin-top:12px;}

  /* 자동태그 미리보기 */
  .auto-preview{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;min-height:4px;}
  .auto-badge{
    padding:3px 10px;border-radius:20px;
    
    font-size:11px;font-weight:700;color:#fff;
  }

  /* 태그 입력 */
  .tag-wrap{position:relative;}
  .tag-box{
    display:flex;flex-wrap:wrap;gap:5px;align-items:center;
    background:#fff;border-radius:12px;
    padding:7px 10px;min-height:42px;cursor:text;
    box-shadow:inset 4px 5px 10px rgba(15,38,60,.28),inset -2px -2px 5px rgba(15,38,60,.08);
  }
  .tag-box:focus-within{box-shadow:inset 4px 5px 12px rgba(15,38,60,.35),inset -2px -2px 5px rgba(15,38,60,.1);}
  .tag-pill{
    display:flex;align-items:center;gap:3px;
    padding:3px 9px;border-radius:20px;
    
    font-size:12px;font-weight:700;color:#fff;
  }
  .tag-pill button{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;line-height:1;opacity:.8;padding:0;font-weight:bold;}
  .tag-pill button:hover{opacity:1;}
  .tag-real{border:none!important;background:transparent!important;padding:2px 4px!important;min-width:70px;flex:1;font-size:13px;outline:none;color:var(--text);box-shadow:none!important;}
  .tag-dd{
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    background:var(--bg2);
    border:var(--bw) solid var(--navy);border-radius:var(--radius);
    max-height:180px;overflow-y:auto;display:none;z-index:400;
    box-shadow:var(--shadow-m);
  }
  .tag-dd.show{display:block;}
  .tag-dd-item{
    display:flex;align-items:center;gap:8px;
    padding:9px 14px;cursor:pointer;font-size:13px;font-weight:500;
    color:var(--text);transition:background .1s;
    border-bottom:1px dashed var(--navy-soft);
  }
  .tag-dd-item:last-child{border-bottom:none;}
  .tag-dd-item:hover{background:#f5f6f8;}
  .tag-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .tag-cnt{margin-left:auto;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;font-weight:600;}

  /* 필터 */
  .filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center;}

  /* 검색창 드롭다운으로 떨어지는 태그 필터 */
  .tag-dropdown{
    position:absolute;top:calc(100% + 8px);left:0;right:0;
    background:var(--bg2);
    border-radius:var(--radius);
    padding:10px 14px;margin-bottom:0;
    box-shadow:var(--shadow-l);
    z-index:300;
    opacity:0;visibility:hidden;transform:translateY(-4px);
    transition:opacity .15s,transform .15s,visibility .15s;
    max-height:240px;overflow-y:auto;
  }
  .search-wrap:hover .tag-dropdown,
  .search-wrap:focus-within .tag-dropdown,
  .tag-dropdown:hover{
    opacity:1;visibility:visible;transform:translateY(0);
  }
  .filter-label{
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:13px;color:var(--navy);
    padding-right:4px;
  }
  .filter-chip{
    display:flex;align-items:center;gap:5px;
    padding:5px 12px;border-radius:20px;
    font-size:12px;font-weight:700;color:var(--navy);
    background:var(--bg2);
    cursor:pointer;transition:all .1s;
  }
  .filter-chip:hover{background:#f0f2f5;}
  .filter-chip.active{color:#fff;box-shadow:var(--shadow-s);transform:translateY(-1px);}
  .chip-dot{width:8px;height:8px;border-radius:50%;}

  /* 검색 배너 */
  .search-banner{
    display:none;align-items:center;justify-content:space-between;
    background:var(--green-soft);
    border:var(--bw) solid var(--navy);border-radius:14px;
    padding:10px 16px;margin-bottom:14px;
    box-shadow:var(--shadow-s);
  }
  .search-banner.show{display:flex;}
  .search-banner span{font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;color:var(--green-dark);}
  .search-banner button{
    font-size:12px;color:var(--navy);cursor:pointer;
    background:var(--bg2);
    border-radius:20px;padding:3px 10px;font-weight:700;
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;
  }
  .search-banner button:hover{background:#fff;}

  /* 카드 */
  .count-label{
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;color:var(--navy);
    margin-bottom:14px;
  }
  .count-label::before{content:'';}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px;}
  .card{
    background:#fff;
    border:none;border-radius:var(--radius-lg);
    padding:0;transition:transform .15s,box-shadow .15s;
    box-shadow:5px 5px 0 var(--navy),8px 12px 20px rgba(21,53,83,.12);
    position:relative;cursor:pointer;
    overflow:hidden;
  }
  .card:nth-child(6n+1){transform:rotate(-1.2deg);}
  .card:nth-child(6n+2){transform:rotate(.6deg);}
  .card:nth-child(6n+3){transform:rotate(-.4deg);}
  .card:nth-child(6n+4){transform:rotate(1.1deg);}
  .card:nth-child(6n+5){transform:rotate(-.8deg);}
  .card:nth-child(6n){transform:rotate(.3deg);}
  .card:hover{transform:translateY(-3px) rotate(0);box-shadow:7px 7px 0 var(--navy),10px 16px 28px rgba(21,53,83,.16);}

  /* 카드 헤더 (그린 영역) */
  .card-head{
    background:var(--green);
    padding:14px 18px 16px;
    position:relative;
  }
  .card-title{
    font-family:'Jalnan',sans-serif;
    font-size:14px;font-weight:normal;
    color:#fff;line-height:1.35;
    padding-right:38px;letter-spacing:-.01em;
    margin-bottom:0;
    word-break:keep-all;
  }

  /* 점 세개: 헤더 안 흰 글자만 */
  .more-btn{
    position:absolute;top:8px;right:10px;
    background:transparent;border:none;
    cursor:pointer;font-size:24px;color:#fff;
    padding:4px 8px;line-height:1;font-weight:bold;
    transition:transform .1s;z-index:2;
  }
  .more-btn:hover{transform:scale(1.1);}

  /* 카드 본문 */
  .card-body{
    padding:16px 16px 14px;
    background:#fff;
  }

  /* 메모: 노란 알약 형광펜 */
  .card-memo{
    display:inline-block;
    background:#FFF17C;
    padding:7px 14px;border-radius:20px;
    font-size:13px;color:var(--text);line-height:1.5;font-weight:500;
    margin-bottom:14px;
    max-width:100%;
  }

  .card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;}
  .tag-badge{
    padding:3px 12px;border-radius:14px;
    border:none;
    font-size:11px;font-weight:700;color:#fff;
  }
  .card-meta{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .card-author{
    font-size:12px;font-weight:700;
    color:var(--navy);font-family:'Pretendard',sans-serif;
  }

  /* 모달 */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(21,53,83,.55);
    z-index:500;display:none;align-items:center;justify-content:center;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--bg2);
    border:var(--bw) solid var(--navy);border-radius:var(--radius-lg);
    padding:26px;width:480px;max-width:92vw;max-height:90vh;overflow-y:auto;
    box-shadow:8px 8px 0 var(--shadow-c);
  }
  .modal-title{
    font-family:'Jalnan',sans-serif;font-size:22px;
    color:var(--green);margin-bottom:18px;
    display:inline-block;
  }
  .modal-group{margin-bottom:12px;display:flex;flex-direction:column;gap:6px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  /* 미리보기 모달 */
  .preview-overlay{
    position:fixed;inset:0;background:rgba(21,53,83,.7);
    z-index:600;display:none;align-items:center;justify-content:center;
    padding:20px;
  }
  .preview-overlay.show{display:flex;animation:fadeIn .15s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .preview-box{
    background:var(--bg2);
    border-radius:var(--radius-lg);
    max-width:96vw;max-height:96vh;
    box-shadow:var(--shadow-l);
    position:relative;
    overflow:hidden;
  }
  .preview-close{
    position:absolute;top:10px;right:10px;
    background:rgba(255,255,255,.95);border:none;
    width:34px;height:34px;border-radius:50%;
    font-size:20px;font-weight:bold;cursor:pointer;
    z-index:10;color:var(--navy);
    display:flex;align-items:center;justify-content:center;line-height:1;
    box-shadow:var(--shadow-s);
  }
  .preview-close:hover{background:#fff;}
  .preview-frame-wrap{
    background:#000;line-height:0;
  }
  .preview-frame-wrap iframe{display:block;border:none;max-width:96vw;}
  .preview-info{
    padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .preview-title{
    font-size:14px;font-weight:600;color:var(--navy);
    flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }

  /* 토스트 */
  .toast{
    position:fixed;top:80px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#fff;
    border:var(--bw) solid var(--navy);border-radius:30px;
    padding:10px 20px;font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:14px;
    z-index:999;display:none;box-shadow:var(--shadow-m);
  }
  .toast.show{display:block;}
  .loading{
    display:inline-block;width:14px;height:14px;
    border:2.5px solid var(--navy-soft);border-top-color:var(--green);
    border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .status-msg{
    text-align:center;padding:60px 20px;
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:15px;color:var(--text2);
  }
  .status-msg img{
    display:block;
    width:88px;height:88px;
    margin:0 auto 16px;
    transform:rotate(-6deg);
    opacity:.85;
  }
  .show-more-btn{
    background:var(--green);color:#fff;
    border:none;
    padding:10px 24px 10px 20px;border-radius:30px;
    font-family:'Jalnan',sans-serif;font-size:15px;
    cursor:pointer;
    box-shadow:3px 3px 0 #004d13,5px 7px 12px rgba(0,77,19,.25);
    transition:transform .1s,box-shadow .1s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .show-more-btn:hover{
    transform:translateY(-2px);
    box-shadow:3px 5px 0 #004d13,6px 10px 16px rgba(0,77,19,.3);
  }
  .show-more-btn:active{
    transform:translateY(2px);
    box-shadow:1px 1px 0 #004d13;
  }
  .show-more-btn img{
    width:32px;height:32px;display:block;
    transform:rotate(-8deg);
  }

  /* 리마인드 */
  .remind-toast{
    position:fixed;bottom:24px;right:24px;
    background:var(--bg2);
    border:var(--bw) solid var(--navy);border-radius:var(--radius-lg);
    padding:18px 20px;max-width:310px;z-index:999;display:none;
    box-shadow:var(--shadow-l);
  }
  .remind-toast.show{display:block;animation:slideUp .25s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .remind-label{
    font-family:'Jalnan',sans-serif;font-size:13px;
    color:#fff;background:var(--green);
    
    padding:3px 10px;border-radius:8px;
    display:inline-block;margin-bottom:10px;
  }
  .remind-title{
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:15px;
    margin-bottom:5px;color:var(--navy);line-height:1.4;
  }
  .remind-memo{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.5;font-weight:500;}
  .remind-actions{display:flex;gap:7px;align-items:center;}
  .remind-queue{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:auto;font-weight:600;}
  .remind-close{
    position:absolute;top:10px;right:10px;
    background:var(--bg2);
    border-radius:50%;width:26px;height:26px;
    color:var(--navy);font-size:14px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    line-height:1;font-weight:bold;
  }
  .remind-close:hover{background:#f0f2f5;}
  .remind-btn{
    padding:5px 12px;border-radius:14px;
    cursor:pointer;
    font-family:'Pretendard','Pretendard Variable',-apple-system,sans-serif;font-size:12px;font-weight:500;
    transition:all .1s;
  }
  .remind-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-s);}

  @media(max-width:600px){
    .form-grid{grid-template-columns:1fr;}
    .top-bar-inner{padding:10px 16px;}
    main{padding:16px;}
    .logo{font-size:24px;}
    .card:nth-child(n){transform:rotate(0);}
  }
</style>
</head>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwaPZJfMHR15xGfgx0HZWOqLqR5i-UWqC_Td08icyboxHjVN22v2n2-fl2lE729mE2u/exec';
const TAG_COLORS = ['#FF838B','#FCBCBF'];
const AUTHOR_COLORS = ['#00681A','#153553','#6c5ce7','#f59e0b','#3b82f6','#ec4899','#10b981','#f97316'];
const tagColorMap = {}, authorColorMap = {};

const FIXED_TAG_COLORS = {
  '틱톡': '#000000',
  '인스타그램': '#CF05E7',
  '유튜브': '#FF0000',
  '비즈밈': '#41A2FE',
};

// 카드/필터에서 숨길 자동 태그 (데이터는 유지, 검색 가능)
const HIDDEN_TAGS = new Set(['인스타그램','틱톡','유튜브','핀터레스트','트위터','페이스북','비메오','블로그','브런치','미디엄','비핸스','드리블','GIF','이미지','영상','PDF']);

function getTagColor(t) {
  if (FIXED_TAG_COLORS[t]) return FIXED_TAG_COLORS[t];
  if (!tagColorMap[t]) tagColorMap[t] = TAG_COLORS[Object.keys(tagColorMap).length % TAG_COLORS.length];
  return tagColorMap[t];
}
function getAuthorColor(n) {
  if (!authorColorMap[n]) authorColorMap[n] = AUTHOR_COLORS[Object.keys(authorColorMap).length % AUTHOR_COLORS.length];
  return authorColorMap[n];
}

let allItems = [], activeTag = null, activeAuthor = null;
let curTags = [], editTags = [];
let myName = localStorage.getItem('ref_name') || '';

// 폼 작성자 select에 마지막 선택자 기본값 적용
(function initName() {
  if (myName) {
    const sel = document.getElementById('inp-name');
    if (sel && Array.from(sel.options).some(o => o.value === myName)) {
      sel.value = myName;
    }
  }
})();

// URL 자동 태그
const URL_RULES = [
  { p: /youtube\.com|youtu\.be/i, tags: ['유튜브', '영상'] },
  { p: /instagram\.com/i, tags: ['인스타그램'] },
  { p: /tiktok\.com/i, tags: ['틱톡', '영상'] },
  { p: /pinterest\.|pin\.it/i, tags: ['핀터레스트', '이미지'] },
  { p: /twitter\.com|x\.com/i, tags: ['트위터'] },
  { p: /facebook\.com/i, tags: ['페이스북'] },
  { p: /vimeo\.com/i, tags: ['비메오', '영상'] },
  { p: /blog\.naver|naver\.com\/blog/i, tags: ['블로그'] },
  { p: /tistory\.com/i, tags: ['블로그'] },
  { p: /brunch\.co\.kr/i, tags: ['브런치'] },
  { p: /medium\.com/i, tags: ['미디엄'] },
  { p: /behance\.net/i, tags: ['비핸스', '디자인'] },
  { p: /dribbble\.com/i, tags: ['드리블', '디자인'] },
  { p: /\.gif(\?|$)/i, tags: ['GIF'] },
  { p: /\.(jpg|jpeg|png|webp)(\?|$)/i, tags: ['이미지'] },
  { p: /\.(mp4|mov|avi|webm)(\?|$)/i, tags: ['영상'] },
  { p: /\.pdf(\?|$)/i, tags: ['PDF'] },
];
const ALL_AUTO = new Set(URL_RULES.flatMap(r => r.tags));

function detectTags(url) {
  if (!url) return [];
  const found = new Set();
  URL_RULES.forEach(r => { if (r.p.test(url)) r.tags.forEach(t => found.add(t)); });
  return [...found];
}

function onUrl(url) {
  const detected = detectTags(url);
  // 미리보기
  document.getElementById('auto-preview').innerHTML = detected
    .map(t => `<span class="auto-badge" style="background:${getTagColor(t)}">${t}</span>`)
    .join('');
  // 태그에 반영
  curTags = curTags.filter(t => !ALL_AUTO.has(t));
  detected.forEach(t => { if (!curTags.includes(t)) curTags.push(t); });
  renderPills('tag-box', curTags, removeTag);
}

function onEditUrl(url) {
  const detected = detectTags(url);
  editTags = editTags.filter(t => !ALL_AUTO.has(t));
  detected.forEach(t => { if (!editTags.includes(t)) editTags.push(t); });
  renderPills('edit-tag-box', editTags, removeEditTag);
}

// 태그 pill 렌더
function renderPills(boxId, tags, removeFn) {
  const box = document.getElementById(boxId);
  const input = box.querySelector('.tag-real');
  box.querySelectorAll('.tag-pill').forEach(p => p.remove());
  tags.forEach((tag, i) => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.style.background = getTagColor(tag);
    pill.innerHTML = `${esc(tag)}<button onclick="(${removeFn.name})(${i})">×</button>`;
    box.insertBefore(pill, input);
  });
}

function removeTag(i) { curTags.splice(i, 1); renderPills('tag-box', curTags, removeTag); }
function removeEditTag(i) { editTags.splice(i, 1); renderPills('edit-tag-box', editTags, removeEditTag); }

function onTagInput(val) { showDD('tag-dd', val, curTags, addTag); }
function onTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = e.target.value.trim().replace(/,$/, '');
    if (v) addTag(v);
  }
  if (e.key === 'Backspace' && !e.target.value && curTags.length) {
    curTags.pop(); renderPills('tag-box', curTags, removeTag);
  }
}
function addTag(tag) {
  tag = tag.trim();
  if (!tag || curTags.includes(tag)) return;
  curTags.push(tag); getTagColor(tag);
  renderPills('tag-box', curTags, removeTag);
  document.getElementById('tag-real').value = '';
  document.getElementById('tag-dd').classList.remove('show');
}

function onEditTagInput(val) { showDD('edit-tag-dd', val, editTags, addEditTag); }
function onEditTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = e.target.value.trim().replace(/,$/, '');
    if (v) addEditTag(v);
  }
  if (e.key === 'Backspace' && !e.target.value && editTags.length) {
    editTags.pop(); renderPills('edit-tag-box', editTags, removeEditTag);
  }
}
function addEditTag(tag) {
  tag = tag.trim();
  if (!tag || editTags.includes(tag)) return;
  editTags.push(tag); getTagColor(tag);
  renderPills('edit-tag-box', editTags, removeEditTag);
  document.getElementById('edit-tag-real').value = '';
  document.getElementById('edit-tag-dd').classList.remove('show');
}

function showDD(ddId, val, excludeTags, addFn) {
  const dd = document.getElementById(ddId);
  const map = getTagMap();
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]);
  const filtered = sorted.filter(([t]) => !excludeTags.includes(t) && (!val || t.includes(val)));
  if (!filtered.length) { dd.classList.remove('show'); return; }
  dd.innerHTML = filtered.map(([tag, cnt]) =>
    `<div class="tag-dd-item" onclick="(${addFn.name})('${tag}')">
      <span class="tag-dot" style="background:${getTagColor(tag)}"></span>
      <span>${esc(tag)}</span>
      <span class="tag-cnt">${cnt}</span>
    </div>`
  ).join('');
  dd.classList.add('show');
}

function getTagMap() {
  const m = {};
  allItems.forEach(item => {
    if (!item.tags) return;
    item.tags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => { m[t] = (m[t] || 0) + 1; });
  });
  return m;
}

document.addEventListener('click', e => {
  if (!e.target.closest('.tag-wrap')) document.querySelectorAll('.tag-dd').forEach(d => d.classList.remove('show'));
});

// 저장
async function saveItem() {
  const url = document.getElementById('inp-url').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const name = document.getElementById('inp-name').value;
  const memo = document.getElementById('inp-memo').value.trim();
  const tags = curTags.join(', ');
  if (!url || !title) { showToast('URL과 제목은 필수입니다'); return; }
  if (!name) { showToast('작성자를 선택해주세요'); return; }
  // 마지막 선택 작성자 저장 → 다음 방문 시 select 기본값
  myName = name;
  localStorage.setItem('ref_name', name);
  const btn = document.getElementById('save-btn');
  btn.textContent = '추가 중...'; btn.disabled = true;
  const date = new Date().toISOString().slice(0, 10);
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, title, tags, date, memo, name })
    });
    document.getElementById('inp-url').value = '';
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-memo').value = '';
    document.getElementById('auto-preview').innerHTML = '';
    curTags = []; renderPills('tag-box', curTags, removeTag);
    showToast('✓ 추가되었습니다');
    setTimeout(loadItems, 1000);
  } catch (e) { showToast('저장 실패. 다시 시도해주세요.'); }
  btn.textContent = '추가하기'; btn.disabled = false;
}

// 불러오기
async function loadItems() {
  document.getElementById('grid').innerHTML = '<div class="status-msg"><span class="loading"></span> 불러오는 중...</div>';
  try {
    const res = await fetch(API + '?action=get');
    allItems = await res.json();
    allItems.reverse();
    allItems.forEach(item => {
      if (item.tags) item.tags.split(',').map(t => t.trim()).filter(Boolean).forEach(t => getTagColor(t));
      if (item.name) getAuthorColor(item.name);
    });
    activeTag = null; activeAuthor = null;
    renderAuthorFilters(); renderTagFilters(); renderCards(allItems, 9);
    prefetchRemind();
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="status-msg">불러오기 실패. 새로고침해주세요.</div>';
  }
}

// 필터
function renderAuthorFilters() {
  const authors = {};
  allItems.forEach(item => { if (item.name) authors[item.name] = (authors[item.name] || 0) + 1; });
  const row = document.getElementById('author-row');
  if (!Object.keys(authors).length) { row.innerHTML = ''; return; }
  row.innerHTML = '<span class="filter-label">작성자</span>';
  Object.entries(authors).forEach(([name, cnt]) => {
    const c = getAuthorColor(name);
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (activeAuthor === name ? ' active' : '');
    if (activeAuthor === name) chip.style.background = c;
    chip.innerHTML = `<span class="chip-dot" style="background:${c}"></span>${esc(name)} <span style="opacity:.7">${cnt}</span>`;
    chip.onclick = () => { activeAuthor = activeAuthor === name ? null : name; renderAuthorFilters(); applyFilters(); };
    row.appendChild(chip);
  });
}

function renderTagFilters() {
  const map = getTagMap();
  // 필터 칩에서도 숨김 태그 제외 (검색은 가능)
  const sorted = Object.entries(map).filter(([t]) => !HIDDEN_TAGS.has(t)).sort((a, b) => a[0].localeCompare(b[0], 'ko'));
  const row = document.getElementById('tag-row');
  row.innerHTML = '<span class="filter-label">태그 필터</span>';
  sorted.forEach(([tag, cnt]) => {
    const c = getTagColor(tag);
    const chip = document.createElement('div');
    chip.className = 'filter-chip' + (activeTag === tag ? ' active' : '');
    if (activeTag === tag) chip.style.background = c;
    chip.innerHTML = `<span class="chip-dot" style="background:${c}"></span>${esc(tag)} <span style="opacity:.7">${cnt}</span>`;
    chip.onclick = () => { activeTag = activeTag === tag ? null : tag; renderTagFilters(); applyFilters(); };
    row.appendChild(chip);
  });
}

function applyFilters() {
  let items = allItems;
  if (activeAuthor) items = items.filter(i => i.name === activeAuthor);
  if (activeTag) items = items.filter(i => i.tags && i.tags.split(',').map(t => t.trim()).includes(activeTag));
  const limit = (activeAuthor || activeTag) ? null : 9;
  renderCards(items, limit);
}

// 검색
function globalSearch(q) {
  q = q.trim();
  if (!q) { clearSearch(); return; }
  const ql = q.toLowerCase();
  activeTag = null; activeAuthor = null;
  renderAuthorFilters(); renderTagFilters();
  const matches = allItems.filter(i =>
    (i.title || '').toLowerCase().includes(ql) ||
    (i.tags || '').toLowerCase().includes(ql) ||
    (i.memo || '').toLowerCase().includes(ql) ||
    (i.url || '').toLowerCase().includes(ql) ||
    (i.name || '').toLowerCase().includes(ql)
  );
  document.getElementById('search-text').textContent = `"${q}" 검색 결과 ${matches.length}개`;
  document.getElementById('search-banner').classList.add('show');
  renderCards(matches);
}

function clearSearch() {
  document.getElementById('g-search').value = '';
  document.getElementById('search-banner').classList.remove('show');
  activeTag = null; activeAuthor = null;
  renderAuthorFilters(); renderTagFilters(); renderCards(allItems, 9);
}

// 미리보기 (유튜브/인스타/틱톡 임베드)
function getEmbedInfo(url) {
  if (!url) return null;
  let m;
  // YouTube Shorts (세로)
  m = url.match(/youtube\.com\/shorts\/([^?&\/]+)/i);
  if (m) return { embed:`https://www.youtube.com/embed/${m[1]}`, w:340, h:600, kind:'youtube' };
  // YouTube 일반 (가로)
  m = url.match(/youtube\.com\/watch\?v=([^&]+)/i) || url.match(/youtu\.be\/([^?&\/]+)/i) || url.match(/youtube\.com\/embed\/([^?&\/]+)/i);
  if (m) return { embed:`https://www.youtube.com/embed/${m[1]}`, w:720, h:405, kind:'youtube' };
  // Instagram (post, reel, tv)
  m = url.match(/instagram\.com\/(p|reel|tv)\/([^\/?&]+)/i);
  if (m) return { embed:`https://www.instagram.com/${m[1]}/${m[2]}/embed/`, w:400, h:650, kind:'instagram' };
  // TikTok
  m = url.match(/tiktok\.com\/.*video\/(\d+)/i) || url.match(/vm\.tiktok\.com\/([^\/?&]+)/i);
  if (m) return { embed:`https://www.tiktok.com/embed/v2/${m[1]}`, w:340, h:600, kind:'tiktok' };
  return null;
}

function openPreviewByIdx(idx) {
  const item = allItems[idx];
  if (!item) return;
  const info = getEmbedInfo(item.url);
  if (!info) {
    // 임베드 불가 → 새 탭
    window.open(item.url, '_blank');
    return;
  }
  const wrap = document.getElementById('preview-frame-wrap');
  wrap.innerHTML = `<iframe src="${info.embed}" width="${info.w}" height="${info.h}" allowfullscreen frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" scrolling="no"></iframe>`;
  document.getElementById('preview-title').textContent = item.title || '';
  document.getElementById('preview-open').onclick = () => window.open(item.url, '_blank');
  document.getElementById('preview-modal').classList.add('show');
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('show');
  document.getElementById('preview-frame-wrap').innerHTML = ''; // iframe 정지(소리 끊기)
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('preview-modal').classList.contains('show')) closePreview();
  }
});

// 수정
function openEdit(idx) {
  const item = allItems[idx];
  document.getElementById('edit-idx').value = idx;
  document.getElementById('edit-date').textContent = item.date ? '📅 ' + String(item.date).slice(0, 10).replace(/-/g, '.') : '';
  document.getElementById('edit-url').value = item.url || '';
  document.getElementById('edit-title').value = item.title || '';
  const editNameSel = document.getElementById('edit-name');
  if (item.name && Array.from(editNameSel.options).some(o => o.value === item.name)) {
    editNameSel.value = item.name;
  } else {
    editNameSel.value = editNameSel.options[0].value;
  }
  document.getElementById('edit-memo').value = item.memo || '';
  editTags = item.tags ? item.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
  renderPills('edit-tag-box', editTags, removeEditTag);
  document.getElementById('edit-modal').classList.add('show');
}

function closeModal() { document.getElementById('edit-modal').classList.remove('show'); editTags = []; }

async function deleteItem() {
  if (!confirm('정말 삭제하시겠어요?')) return;
  const idx = parseInt(document.getElementById('edit-idx').value);
  const rowNum = allItems.length - idx + 1;
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete', row: rowNum })
    });
    allItems.splice(idx, 1);
    closeModal();
    showToast('✓ 삭제되었습니다');
    renderAuthorFilters(); renderTagFilters(); renderCards(allItems, 9);
  } catch (e) { showToast('삭제 실패.'); }
}

async function saveEdit() {
  const idx = parseInt(document.getElementById('edit-idx').value);
  const url = document.getElementById('edit-url').value.trim();
  const title = document.getElementById('edit-title').value.trim();
  const name = document.getElementById('edit-name').value.trim() || allItems[idx].name;
  const memo = document.getElementById('edit-memo').value.trim();
  const tags = editTags.join(', ');
  if (!title) { showToast('제목은 필수입니다'); return; }
  const rowNum = allItems.length - idx + 1;
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'update', row: rowNum, url, title, tags, memo, name })
    });
    allItems[idx].url = url; allItems[idx].title = title;
    allItems[idx].tags = tags; allItems[idx].memo = memo;
    allItems[idx].name = name;
    closeModal(); showToast('✓ 수정되었습니다');
    renderAuthorFilters(); renderTagFilters(); applyFilters();
  } catch (e) { showToast('수정 실패.'); }
}

document.getElementById('edit-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('edit-modal')) closeModal();
});

// 유틸
function getType(url) {
  if (!url) return 'LINK';
  if (/youtube\.com|youtu\.be/i.test(url)) return 'YOUTUBE';
  if (/instagram\.com/i.test(url)) return 'INSTAGRAM';
  if (/tiktok\.com/i.test(url)) return 'TIKTOK';
  if (/pinterest\.|pin\.it/i.test(url)) return 'PINTEREST';
  if (/twitter\.com|x\.com/i.test(url)) return 'TWITTER';
  if (/vimeo\.com/i.test(url)) return 'VIMEO';
  if (/behance\.net/i.test(url)) return 'BEHANCE';
  if (/dribbble\.com/i.test(url)) return 'DRIBBBLE';
  if (/tistory|naver.*blog|brunch|medium/i.test(url)) return 'BLOG';
  return 'LINK';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 리마인드 큐
let remindQueue = [];

function prefetchRemind() {
  if (allItems.length === 0) return;
  while (remindQueue.length < 3) {
    const item = allItems[Math.floor(Math.random() * allItems.length)];
    remindQueue.push(item);
  }
}

function showRemind() {
  if (allItems.length === 0) { showToast('저장된 레퍼런스가 없습니다'); return; }
  if (remindQueue.length === 0) prefetchRemind();
  displayRemind();
}

function displayRemind() {
  if (remindQueue.length === 0) { showToast('잠시 후 다시 눌러주세요'); return; }
  const item = remindQueue[0];
  document.getElementById('remind-title').textContent = item.title || '';
  document.getElementById('remind-memo').textContent = item.memo || '';
  document.getElementById('remind-queue').textContent = remindQueue.length + '개 대기';
  doc
